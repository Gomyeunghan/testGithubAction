# .github/workflows/actions.yml

# 이름 짓기 워크플로우의 이름으로 추후 깃헙 레포에 표시됩
name: Github Actions 연습하기
# 언제 이 작업을 실행할지 정의
on: push
# 언제 이작업을 실행할건데 (여기서는 push때 마다 실행)

jobs:
  push-job:
    runs-on: ubuntu-latest
    steps:
      - name: 첫 번째 작업
        run: echo "첫 번째 작업 실행 중"

      - name: 여러 명령어 문장 작성하기
        run: |
          echo "첫 번째 명령어"
          echo "두 번째 명령어"

      - name: Github Actions 자체 저장되어있는 변수 사용하기
        run: |
          echo $GITHUB_SHA
          echo $GITHUB_REPOSITORY
